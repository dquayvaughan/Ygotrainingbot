name: Train Yu-Gi-Oh Format

on:
  workflow_dispatch:
    inputs:
      format_config:
        description: "Path to the format JSON config"
        required: true
        default: "configs/formats/starter-normal.json"
      games:
        description: "Number of games to run"
        required: true
        default: "25"
      max_decisions:
        description: "Decision cap per game"
        required: true
        default: "40"

jobs:
  train-format:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "gateways/edopro-ocgcore/package-lock.json"

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Install EDOPro gateway dependencies
        run: npm ci --prefix gateways/edopro-ocgcore

      - name: Bootstrap EDOPro data
        run: scripts/bootstrap_edopro_home.sh /tmp/ygotrain/edopro-home

      - name: Train format
        run: |
          mkdir -p artifacts
          python -m ygotrainingbot.cli train-format \
            --config "${{ inputs.format_config }}" \
            --edopro-home /tmp/ygotrain/edopro-home \
            --games "${{ inputs.games }}" \
            --max-decisions "${{ inputs.max_decisions }}" \
            --output artifacts/format-training-report.json

      - name: Upload training report
        uses: actions/upload-artifact@v4
        with:
          name: format-training-report
          path: artifacts/format-training-report.json
