name: Train Yu-Gi-Oh Format

on:
  workflow_dispatch:
    inputs:
      format_pack:
        description: "Path to the format pack JSON"
        required: true
        default: "configs/format-packs/goat-2005.json"
      games_per_matchup:
        description: "Games to run for each deck matchup"
        required: true
        default: "5"
      max_decisions:
        description: "Decision cap per game"
        required: true
        default: "60"
      learned_policy:
        description: "Optional repo path to learned-policy.json for both agents"
        required: false
        default: ""
      run_promotion:
        description: "Run before/after promotion comparison after learning"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  train-format:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "gateways/edopro-ocgcore/package-lock.json"

      - name: Install Python package
        run: python -m pip install -e ".[dev]"

      - name: Install EDOPro gateway dependencies
        run: npm ci --prefix gateways/edopro-ocgcore

      - name: Bootstrap EDOPro data
        run: scripts/bootstrap_edopro_home.sh /tmp/ygotrain/edopro-home

      - name: Train format pack
        run: |
          mkdir -p artifacts
          if [ "${{ inputs.run_promotion }}" = "true" ]; then
            CURRENT_POLICY="${{ inputs.learned_policy }}"
            if [ -z "$CURRENT_POLICY" ]; then
              CURRENT_POLICY="artifacts/current-policy.json"
            fi
            python -m ygotrainingbot.cli train-learn-promote \
              --pack "${{ inputs.format_pack }}" \
              --edopro-home /tmp/ygotrain/edopro-home \
              --games-per-matchup "${{ inputs.games_per_matchup }}" \
              --max-decisions "${{ inputs.max_decisions }}" \
              --current-policy "$CURRENT_POLICY" \
              --candidate-policy artifacts/learned-policy.json \
              --promote-to artifacts/promoted-policy.json \
              --output-dir artifacts
          else
            EXTRA_ARGS=""
            if [ -n "${{ inputs.learned_policy }}" ]; then
              EXTRA_ARGS="--agent-a-weights ${{ inputs.learned_policy }} --agent-b-weights ${{ inputs.learned_policy }}"
            fi
            python -m ygotrainingbot.cli train-format-pack \
              --pack "${{ inputs.format_pack }}" \
              --edopro-home /tmp/ygotrain/edopro-home \
              --games-per-matchup "${{ inputs.games_per_matchup }}" \
              --max-decisions "${{ inputs.max_decisions }}" \
              --output artifacts/format-training-report.json \
              $EXTRA_ARGS
            python -m ygotrainingbot.cli learn-from-report \
              --report artifacts/format-training-report.json \
              --policy artifacts/learned-policy.json \
              --summary artifacts/learning-summary.txt
          fi

      - name: Upload training report
        uses: actions/upload-artifact@v4
        with:
          name: format-training-report
          path: |
            artifacts/format-training-report.json
            artifacts/learning-summary.txt
            artifacts/learned-policy.json
            artifacts/promoted-policy.json
            artifacts/promotion-report.json
            artifacts/loop-report.json
