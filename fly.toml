# Fly.io app config — set app name on first deploy: fly apps create <name>
app = "ygotrainingbot"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  YGOTRAIN_DATA_DIR = "/data"
  PORT = "8765"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "ygotrain_data"
  destination = "/data"
  initial_size = "10gb"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2
